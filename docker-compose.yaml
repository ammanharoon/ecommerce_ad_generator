version: '3.8'

services:
  api:
    build: 
      context: .
      dockerfile: docker/Dockerfile
    container_name: ad-generator-api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./logs:/app/logs
    environment: 
      - MODEL_PATH=/app/models/checkpoints/final_model
      - LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - ad-generator-network

  mlflow: 
    image: python:3.11-slim
    container_name: mlflow-server
    ports:
      - "5000:5000"
    volumes: 
      - ./mlruns:/mlflow/mlruns
      - ./mlartifacts:/mlflow/mlartifacts
    command: >
      bash -c "pip install mlflow && 
      mlflow server --host 0.0.0.0 --port 5000 
      --backend-store-uri file:///mlflow/mlruns 
      --default-artifact-root file:///mlflow/mlartifacts"
    networks:
      - ad-generator-network

networks:
  ad-generator-network:
    driver: bridge