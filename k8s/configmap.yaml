apiVersion: v1
kind: ConfigMap
metadata:
  name: ad-generator-config
  namespace:   default
data:
  # Application configuration
  APP_NAME: "ad-generator-api"
  APP_VERSION:  "1.0.0"
  LOG_LEVEL: "INFO"
  
  # Model configuration
  MODEL_PATH: "/app/models/checkpoints/final_model"
  MODEL_NAME: "google/flan-t5-base"
  
  # API configuration
  API_HOST: "0.0.0.0"
  API_PORT:  "8000"
  
  # Performance settings
  MAX_WORKERS: "4"
  TIMEOUT: "300"