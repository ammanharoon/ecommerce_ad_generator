apiVersion: apps/v1
kind: Deployment
metadata:
  name: ad-generator-canary
  labels:
    app: ad-generator
    version: canary
    track: canary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ad-generator
      version: canary
  template:
    metadata:
      labels:
        app: ad-generator
        version: canary
        track: canary
    spec:
      containers:
      - name: ad-generator-api
        image: ammanharoon/ad-generator-api:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: MODEL_PATH
          value: "/app/models/checkpoints/final_model"
        - name: VERSION
          value: "canary"
        - name: DEPLOYMENT_TRACK
          value: "canary"
        envFrom:
        - configMapRef:
            name: ad-generator-config
        - secretRef:
            name: ad-generator-secret
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
