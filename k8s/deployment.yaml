apiVersion: apps/v1
kind: Deployment
metadata:
  name: ad-generator-deployment
  namespace: default
  labels:
    app: ad-generator
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ad-generator
  template:
    metadata:
      labels:
        app: ad-generator
        version: v1
    spec:
      containers:
      - name: ad-generator-api
        image: ammanharoon/ad-generator-api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP

        # Environment variables from ConfigMap
        envFrom:
        - configMapRef:
            name: ad-generator-config

        # Environment variables from Secret
        env:
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: ad-generator-secret
              key: API_KEY
        
        # Resource limits
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        
        # Liveness probe (is container alive?)
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        # Readiness probe (is container ready for traffic?)
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        
        # Startup probe (for slow-starting containers)
        startupProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 12

      # Restart policy
      restartPolicy: Always